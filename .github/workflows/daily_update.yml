name: Daily FSC RSS Fetcher

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

# 全域設定：強制讓所有 Action 使用 Node.js 24 執行，消除 Deprecation 警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝必要套件
        run: pip install feedparser

      - name: 執行抓取程式
        run: python main.py

      - name: 自動提交並更新 JSON 檔案
        run: |
          git config --local user.email "andychiu6201@gmail.com"
          git config --local user.name "Andy Chiu (Auto Bot)"
          git add fsc_news.json
          git commit -m "自動更新金管會 RSS 資料: $(date +'%Y-%m-%d')" || exit 0
          git push
